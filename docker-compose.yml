services:
  backend:
    build: ./backend
    environment:
      - NCBI_API_KEY=${NCBI_API_KEY:-}
      - CORS_ORIGINS=["http://localhost:3000"]
      - DB_PATH=/app/data/genesnap.db
    volumes:
      - db-data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db-data:
